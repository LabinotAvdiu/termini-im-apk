<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-label="Termini im">
  <title>Termini im — monogramme bordeaux</title>
  <desc>Monogramme italique im de Termini im, version bordeaux avec accents or, pour interface pro et premium.</desc>
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@1&amp;family=Instrument+Sans:wght@500&amp;display=swap');
      .ii { font-family: 'Instrument Serif', 'Times New Roman', Georgia, serif; font-style: italic; font-weight: 400; }
      .lbl { font-family: 'Instrument Sans', -apple-system, sans-serif; font-size: 11px; letter-spacing: 0.28em; font-weight: 500; }
    </style>
  </defs>
  <rect width="256" height="256" fill="#7A2232" rx="32"/>
  <circle cx="216" cy="54" r="30" fill="#C89B47" opacity="0.2"/>
  <text x="128" y="178" class="ii" font-size="148" fill="#F7F2EA" text-anchor="middle">im</text>
  <line x1="72" y1="200" x2="184" y2="200" stroke="#C89B47" stroke-width="1.2"/>
  <text x="128" y="222" class="lbl" fill="#C89B47" text-anchor="middle">PRISHTINË</text>
</svg>

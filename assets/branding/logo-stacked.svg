<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 260" role="img" aria-label="Termini im">
  <title>Termini im — version empilée</title>
  <desc>Version empilée du logo Termini im pour formats carrés et supports éditoriaux.</desc>
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400&amp;family=Instrument+Serif:ital@1&amp;family=Instrument+Sans:wght@500&amp;display=swap');
      .fr { font-family: 'Fraunces', 'Times New Roman', Georgia, serif; font-weight: 400; }
      .ii { font-family: 'Instrument Serif', 'Times New Roman', Georgia, serif; font-style: italic; font-weight: 400; }
      .lbl { font-family: 'Instrument Sans', -apple-system, sans-serif; font-size: 11px; letter-spacing: 0.28em; font-weight: 500; }
    </style>
  </defs>
  <!-- dot -->
  <circle cx="160" cy="48" r="8" fill="#7A2232"/>
  <!-- Termini -->
  <text x="160" y="130" class="fr" font-size="72" fill="#171311" text-anchor="middle" letter-spacing="-2">Termini</text>
  <!-- im -->
  <text x="160" y="200" class="ii" font-size="78" fill="#7A2232" text-anchor="middle">im.</text>
  <!-- tagline line -->
  <line x1="110" y1="225" x2="210" y2="225" stroke="#D9CAB3" stroke-width="0.8"/>
  <text x="160" y="245" class="lbl" fill="#716059" text-anchor="middle">PRISHTINË · 2026</text>
</svg>

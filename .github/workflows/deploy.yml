name: Build & Deploy to VPS

on:
  push:
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  build-and-deploy:
    name: Deploy pre-launch landing + Flutter web
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        run: |
          git clone https://github.com/flutter/flutter.git -b stable --depth 1 "$HOME/flutter"
          echo "$HOME/flutter/bin" >> $GITHUB_PATH

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze code
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Run tests
        run: flutter test

      - name: Build web release
        run: flutter build web --release --dart-define=API_BASE_URL=https://api.termini-im.com/api --base-href "/app/"

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" | base64 -d > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ secrets.VPS_SSH_PORT }} -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy pre-launch landing to /var/www/termini-im/
        # The landing is the public face of termini-im.com until launch.
        # When launch ships, swap this back to deploying build/web/ to root
        # (or remove the --base-href flag and deploy build/web/ here too).
        run: |
          rsync -avz --delete \
            --exclude '/app/' \
            --exclude '/.well-known/' \
            -e "ssh -i ~/.ssh/deploy_key -p ${{ secrets.VPS_SSH_PORT }} -o StrictHostKeyChecking=yes" \
            docs/landing/ \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/var/www/termini-im/

      - name: Deploy Flutter web to /var/www/termini-im/app/
        # Keep the Flutter web build accessible at /app/ during pre-launch
        # so internal QA / shared booking links still resolve (the mobile
        # apps continue to use api.termini-im.com directly).
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key -p ${{ secrets.VPS_SSH_PORT }} -o StrictHostKeyChecking=yes" \
            build/web/ \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/var/www/termini-im/app/

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/deploy_key

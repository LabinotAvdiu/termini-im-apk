<!doctype html>
<html lang="sq">
<head>
<meta charset="utf-8" />
<title>Termini im — Feature Graphic (1024×500)</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;1,9..144,400&family=Instrument+Sans:ital,wght@0,400..700;1,400..700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet" />
<script src="https://cdn.jsdelivr.net/npm/html-to-image@1.11.11/dist/html-to-image.min.js"></script>
<style>
  :root {
    --ivory: #f7f2ea;
    --surface: #fcf7ee;
    --bone: #e8dcc8;
    --ink: #171311;
    --muted: #716059;
    --line: #d9cab3;
    --burgundy: #7a2232;
    --gold: #c89b47;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    background: #222;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: "Instrument Sans", -apple-system, BlinkMacSystemFont, sans-serif;
  }

  /* The canvas — exactly 1024×500 at zoom 1. Screenshot this element, not the whole page. */
  .canvas {
    width: 1024px;
    height: 500px;
    background: var(--ivory);
    position: relative;
    overflow: hidden;
    display: flex;
    align-items: center;
    padding: 0 64px;
    box-shadow: 0 20px 80px rgba(0,0,0,0.4);
  }

  /* Grain texture overlay */
  .canvas::before {
    content: "";
    position: absolute;
    inset: 0;
    pointer-events: none;
    opacity: 0.22;
    mix-blend-mode: multiply;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.09 0 0 0 0 0.07 0 0 0 0 0.06 0 0 0 .55 0'/></filter><rect width='100%' height='100%' filter='url(%23n)'/></svg>");
    z-index: 1;
  }

  /* Soft burgundy radial glow top-right */
  .canvas::after {
    content: "";
    position: absolute;
    top: -40%;
    right: -15%;
    width: 60%;
    height: 160%;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(122,34,50,0.13), transparent 70%);
    pointer-events: none;
    z-index: 1;
  }

  /* Left column — editorial copy */
  .left {
    flex: 1;
    position: relative;
    z-index: 2;
    display: flex;
    flex-direction: column;
    justify-content: center;
    max-width: 520px;
  }

  .kicker {
    font-size: 11px;
    letter-spacing: 0.32em;
    text-transform: uppercase;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 22px;
    font-weight: 500;
  }
  .kicker .dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--gold);
  }
  .kicker .sep {
    color: var(--line);
  }

  .headline {
    font-family: "Fraunces", Georgia, serif;
    font-size: 64px;
    line-height: 1.03;
    color: var(--ink);
    font-weight: 400;
    letter-spacing: -1.5px;
    margin: 0 0 18px;
    font-variation-settings: "SOFT" 60;
  }
  .headline em {
    font-family: "Instrument Serif", serif;
    font-style: italic;
    color: var(--burgundy);
    font-weight: 400;
    letter-spacing: -0.8px;
  }

  .sub {
    font-size: 17px;
    line-height: 1.55;
    color: var(--muted);
    max-width: 460px;
    margin: 0 0 32px;
  }

  /* Tagline footer */
  .tagline {
    display: flex;
    align-items: center;
    gap: 14px;
    font-size: 11px;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: var(--muted);
    font-weight: 500;
  }
  .tagline .rule {
    flex: 0 0 32px;
    height: 1px;
    background: linear-gradient(to right, transparent, var(--gold), transparent);
  }

  /* Right column — brand wordmark */
  .right {
    position: relative;
    z-index: 2;
    width: 340px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
  }

  .brand-dot {
    width: 16px;
    height: 16px;
    border-radius: 50%;
    background: var(--burgundy);
    box-shadow: 0 2px 12px rgba(122,34,50,0.35);
    margin-bottom: 4px;
  }

  .wordmark {
    font-family: "Fraunces", Georgia, serif;
    font-size: 96px;
    font-weight: 400;
    letter-spacing: -3px;
    line-height: 1;
    color: var(--ink);
    font-variation-settings: "SOFT" 80;
  }
  .wordmark em {
    font-family: "Instrument Serif", serif;
    font-style: italic;
    color: var(--burgundy);
    font-weight: 400;
    letter-spacing: -1px;
    padding-left: 6px;
  }

  .wordmark-tagline {
    font-size: 10px;
    letter-spacing: 0.36em;
    text-transform: uppercase;
    color: var(--muted);
    margin-top: 6px;
    font-weight: 500;
  }

  /* Export helper block — only shown when not capturing */
  .export-hint {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 10px;
    align-items: center;
    background: rgba(0,0,0,0.78);
    color: white;
    padding: 10px 14px;
    border-radius: 10px;
    font-family: system-ui, sans-serif;
    font-size: 13px;
    letter-spacing: 0.02em;
  }
  .export-hint button {
    background: #7a2232;
    color: white;
    border: 0;
    padding: 8px 14px;
    border-radius: 6px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
    font-size: 13px;
  }
  .export-hint button:hover { background: #9E3D4F; }
</style>
</head>
<body>

<div class="export-hint">
  <span>Feature graphic 1024×500 →</span>
  <button onclick="downloadPng()">Télécharger PNG</button>
</div>

<script>
  function downloadPng() {
    const node = document.querySelector('.canvas');
    htmlToImage.toPng(node, {
      // Force dimensions exactes — ignore le device pixel ratio du navigateur
      width: 1024,
      height: 500,
      pixelRatio: 1,
      cacheBust: true,
    }).then(function (dataUrl) {
      const a = document.createElement('a');
      a.download = 'termini-feature-graphic-1024x500.png';
      a.href = dataUrl;
      a.click();
    }).catch(function (err) {
      alert('Erreur export : ' + err);
    });
  }
</script>

<div class="canvas">
  <div class="left">
    <div class="kicker">
      <span class="dot"></span>

      <span>Kosova</span>
      <span class="sep">·</span>
      <span>2026</span>
    </div>
    <h1 class="headline">
      Rezervo terminin<br />
      në <em>30 sekonda.</em>
    </h1>
    <p class="sub">
      Sallonet e Kosovës, në xhep. Falas për klientët. Falas për sallonet.
      Pa komision. Pa abonim.
    </p>
    <div class="tagline">
      <span class="rule"></span>
      <span>Bukuri · Stil</span>
    </div>
  </div>

  <div class="right">
    <div class="brand-dot"></div>
    <div class="wordmark">Termini<em>im</em></div>
    <div class="wordmark-tagline">Aplikacioni shqip</div>
  </div>
</div>

</body>
</html>
